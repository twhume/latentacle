<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Latentacle</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    #app {
      display: inline-grid;
      grid-template-columns: 420px 420px;
      grid-template-rows: auto auto auto auto auto;
      grid-template-areas:
        "header   header"
        "generate generate"
        "axis     axis"
        "canvas   image"
        "history  history";
      gap: 0.5rem;
    }

    #generate-card { grid-area: generate; }
    #axis-row      { grid-area: axis; }
    #canvas-col    { grid-area: canvas; display: flex; flex-direction: column; gap: 0.3rem; }
    #image-section { grid-area: image; }
    #history-row   { grid-area: history; }

    #explore-canvas {
      display: block;
      cursor: crosshair;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      touch-action: none;
    }

    #t-display {
      font-size: 0.7rem;
      color: var(--accent);
      text-align: center;
      min-height: 1em;
      font-family: "SF Mono", "Fira Code", monospace;
    }

    .axis-label {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--muted);
      align-self: center;
      flex-shrink: 0;
      padding: 0 0.1rem;
    }

    /* ── Action buttons row ───────────────── */
    #image-actions {
      display: flex;
      gap: 0.35rem;
      justify-content: flex-end;
    }
    #image-actions button {
      font-size: 0.7rem;
      padding: 0.25rem 0.6rem;
    }

    /* ── History strip ────────────────────── */
    #history-row {
      min-height: 0;
    }
    #history-strip {
      display: flex;
      flex-direction: column;
      gap: 0;
      padding: 0.3rem 0;
    }
    #history-strip:empty { display: none; }
    .hist-session {
      border-top: 1px solid var(--border);
      padding: 0.3rem 0 0.2rem;
    }
    .hist-session:first-child { border-top: none; }
    .hist-session-label {
      font-size: 0.65rem;
      color: var(--muted);
      padding: 0 0 0.2rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .hist-session-thumbs {
      display: flex;
      gap: 0.35rem;
      overflow-x: auto;
    }
    .hist-thumb {
      position: relative;
      flex-shrink: 0;
      width: 72px;
      height: 72px;
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .hist-thumb:hover { border-color: var(--accent); }
    .hist-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .hist-delete {
      display: none;
      position: absolute;
      top: 2px;
      right: 2px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: rgba(240,80,96,0.85);
      color: #fff;
      font-size: 11px;
      line-height: 18px;
      text-align: center;
      cursor: pointer;
      border: none;
      padding: 0;
    }
    .hist-thumb:hover .hist-delete { display: block; }
  </style>
</head>
<body>
  <div id="app">

    <header>
      <img src="/static/logo.png?v=2" alt="Latentacle" style="height:60px;vertical-align:middle" />
      <div style="display:flex;align-items:center;gap:0.6rem;">
        <a href="/pong" class="nav-link">Pong ↗</a>
        <div id="status-badge" class="badge loading">Loading model…</div>
      </div>
    </header>

    <!-- ── Generate ───────────────────────────── -->
    <section class="card" id="generate-card">
      <div class="row">
        <input id="prompt" type="text" placeholder="Describe the image…" autocomplete="off" />
        <button id="generate-btn" disabled>Generate</button>
        <input id="upload-input" type="file" accept="image/*" hidden />
        <button id="upload-btn" disabled>Upload</button>
      </div>
      <div class="row subtle">
        <label>Steps
          <input id="gen-steps" type="range" min="1" max="4" step="1" value="3" />
          <span id="gen-steps-val">3</span>
        </label>
        <label>Seed <input id="seed" type="number" placeholder="random" /></label>
        <label><select id="gen-size">
          <option value="512">512 px</option>
          <option value="256">256 px</option>
        </select></label>
      </div>
    </section>

    <!-- ── Axis inputs ────────────────────────── -->
    <section class="card disabled" id="axis-row">
      <div class="row">
        <span class="axis-label">X</span>
        <input id="left-term"   type="text" placeholder="less… (optional)"  autocomplete="off" />
        <input id="right-term"  type="text" placeholder="more…"             autocomplete="off" />
        <span class="axis-label" style="margin-left:0.5rem">Y</span>
        <input id="bottom-term" type="text" placeholder="less… (optional)"  autocomplete="off" />
        <input id="top-term"    type="text" placeholder="more…"             autocomplete="off" />
        <button id="set-btn" disabled>Set axes</button>
        <button id="clear-btn" style="background:transparent;border:1px solid var(--border);color:var(--muted);font-weight:400">Clear</button>
      </div>
      <div class="row subtle">
        <label>Strength
          <input id="strength-slider" type="range" min="10" max="100" step="5" value="80" />
          <span id="strength-val">0.80</span>
        </label>
        <label>Steps
          <input id="interp-steps" type="range" min="1" max="4" step="1" value="3" />
          <span id="interp-steps-val">3</span>
        </label>
        <label>Scale
          <input id="scale-slider" type="range" min="1" max="12" step="1" value="8" />
          <span id="scale-val">8</span>
        </label>
        <label>Confine
          <input id="confinement-slider" type="range" min="0" max="100" step="5" value="50" />
          <span id="confinement-val">0.50</span>
        </label>
        <label>Subject
          <input id="subject-slider" type="range" min="0" max="100" step="5" value="50" />
          <span id="subject-val">0.50</span>
        </label>
      </div>
    </section>

    <!-- ── Canvas ─────────────────────────────── -->
    <section id="canvas-col">
      <canvas id="explore-canvas" width="420" height="420"></canvas>
      <p id="t-display"></p>
    </section>

    <!-- ── Image ──────────────────────────────── -->
    <section id="image-section">
      <div id="image-wrap">
        <img id="result-img" alt="Generated image" style="display:none" />
        <div id="image-placeholder"><p>Generate an image to get started</p></div>
        <div id="spinner">
          <div class="spin-ring"></div>
          <p id="spinner-label">Generating…</p>
        </div>
      </div>
      <div id="image-actions">
        <button id="save-btn" disabled>Save</button>
        <button id="download-btn" disabled>Download</button>
      </div>
      <p id="interp-status"></p>
    </section>

    <!-- ── History ─────────────────────────────── -->
    <section id="history-row">
      <div id="history-strip"></div>
    </section>

  </div>
  <script src="/static/app.js?v=9"></script>
</body>
</html>
