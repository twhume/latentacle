<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Latentacle Pong</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    #pong-app {
      display: inline-grid;
      grid-template-rows: auto auto;
      grid-template-columns: 420px 420px;
      grid-template-areas: "header header" "game image";
      gap: 0.5rem;
    }
    #game-col  { grid-area: game; display: flex; flex-direction: column; gap: 0.3rem; }
    #image-col { grid-area: image; display: flex; flex-direction: column; gap: 0.3rem; }

    .axis-display {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.72rem;
      color: var(--muted);
      white-space: nowrap;
    }
    .axis-display .term { color: var(--accent); font-weight: 600; }
    .axis-display .sep  { color: var(--border); }

    #pong-canvas {
      display: block;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
    }

    #image-wrap {
      position: relative;
      width: 420px;
      height: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    #result-img {
      width: 100%; height: 100%; object-fit: cover; display: none;
    }
    #placeholder {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 0.78rem; text-align: center; padding: 1rem;
    }
    #pong-spinner {
      display: none;
      position: absolute; inset: 0;
      background: rgba(15,15,19,0.75);
      backdrop-filter: blur(4px);
      flex-direction: column; align-items: center; justify-content: center; gap: 0.6rem;
      color: var(--text); font-size: 0.78rem;
    }
    #pong-spinner.visible { display: flex; }

    #interp-status {
      font-size: 0.7rem; color: var(--muted); text-align: center;
      min-height: 1em; font-family: "SF Mono", "Fira Code", monospace;
    }
    #t-display {
      font-size: 0.7rem; color: var(--accent); text-align: center;
      min-height: 1em; font-family: "SF Mono", "Fira Code", monospace;
    }
  </style>
</head>
<body>
  <div id="pong-app">

    <header>
      <div style="display:flex;align-items:center;gap:0.75rem;">
        <a href="/" class="nav-link">← Back</a>
        <h1>Latentacle Pong</h1>
      </div>
      <div id="status-badge" class="badge loading">Loading…</div>
    </header>

    <section id="game-col">
      <canvas id="pong-canvas" width="420" height="360"></canvas>
      <div style="display:flex;align-items:center;gap:0.6rem;">
        <p id="t-display" style="flex:1;margin:0;"></p>
        <button id="record-btn" disabled>Record 10s</button>
        <span id="record-progress" style="font-size:0.7rem;color:var(--muted);font-family:'SF Mono','Fira Code',monospace;min-width:8em;"></span>
      </div>
    </section>

    <section id="image-col">
      <div id="image-wrap">
        <img id="result-img" alt="Generated image" />
        <div id="placeholder"><p>Set start/end terms on the main page first</p></div>
        <div id="pong-spinner">
          <div class="spin-ring"></div>
          <p>Rendering…</p>
        </div>
      </div>
      <p id="interp-status"></p>
    </section>

  </div>
  <script src="/static/pong.js?v=2"></script>
</body>
</html>
