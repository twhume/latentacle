<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PicDancer Pong</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    #pong-app {
      display: inline-grid;
      grid-template-rows: auto auto auto;
      grid-template-columns: 420px 420px;
      grid-template-areas: "header header" "axis axis" "game image";
      gap: 0.5rem;
    }

    #axis-row  { grid-area: axis; }
    #game-col  { grid-area: game; display: flex; flex-direction: column; gap: 0.3rem; }
    #image-col { grid-area: image; display: flex; flex-direction: column; gap: 0.3rem; }

    .axis-display {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.72rem;
      color: var(--muted);
      white-space: nowrap;
    }
    .axis-display .term { color: var(--accent); font-weight: 600; }
    .axis-display .sep  { color: var(--border); }

    #pong-canvas {
      display: block;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
    }

    #image-wrap {
      position: relative;
      width: 420px;
      height: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    #result-img {
      width: 100%; height: 100%; object-fit: cover; display: none;
    }
    #placeholder {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 0.78rem; text-align: center; padding: 1rem;
    }
    #pong-spinner {
      display: none;
      position: absolute; inset: 0;
      background: rgba(15,15,19,0.75);
      backdrop-filter: blur(4px);
      flex-direction: column; align-items: center; justify-content: center; gap: 0.6rem;
      color: var(--text); font-size: 0.78rem;
    }
    #pong-spinner.visible { display: flex; }

    #interp-status {
      font-size: 0.7rem; color: var(--muted); text-align: center;
      min-height: 1em; font-family: "SF Mono", "Fira Code", monospace;
    }
    #t-display {
      font-size: 0.7rem; color: var(--accent); text-align: center;
      min-height: 1em; font-family: "SF Mono", "Fira Code", monospace;
    }
  </style>
</head>
<body>
  <div id="pong-app">

    <header>
      <div style="display:flex;align-items:center;gap:0.75rem;">
        <a href="/" class="nav-link">← Back</a>
        <h1>PicDancer Pong</h1>
      </div>
      <div id="status-badge" class="badge loading">Loading…</div>
    </header>

    <section class="card" id="axis-row">
      <div class="row">
        <div class="axis-display">
          <span>X</span>
          <span class="term" id="axis1-start">—</span>
          <span class="sep">↔</span>
          <span class="term" id="axis1-end">—</span>
        </div>
        <div class="row" style="flex:1; margin-left:0.8rem;">
          <div class="axis-display"><span>Y</span></div>
          <input id="axis2-bottom" type="text" placeholder="bottom…" autocomplete="off" />
          <input id="axis2-top"    type="text" placeholder="top…"    autocomplete="off" />
          <button id="set-y-btn" disabled>Set Y</button>
        </div>
        <div class="row" style="flex:1; margin-left:0.8rem;">
          <div class="axis-display"><span>Z</span></div>
          <input id="axis3-near" type="text" placeholder="near…" autocomplete="off" />
          <input id="axis3-far"  type="text" placeholder="far…"  autocomplete="off" />
          <button id="set-z-btn" disabled>Set Z</button>
        </div>
      </div>
    </section>

    <section id="game-col">
      <canvas id="pong-canvas" width="420" height="360"></canvas>
      <p id="t-display"></p>
    </section>

    <section id="image-col">
      <div id="image-wrap">
        <img id="result-img" alt="Generated image" />
        <div id="placeholder"><p>Set start/end terms on the main page first</p></div>
        <div id="pong-spinner">
          <div class="spin-ring"></div>
          <p>Rendering…</p>
        </div>
      </div>
      <p id="interp-status"></p>
    </section>

  </div>
  <script src="/static/pong.js"></script>
</body>
</html>
